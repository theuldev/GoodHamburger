<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta name="description" content="Sistema de pedidos da Good Hamburger" />
    <title>Good Hamburger</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
